services:

  app:
    build: ../app/backend
    container_name: logcore-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ../brain:/data/brain
      - ../app/frontend/dist:/frontend/dist
      # NOTE: the host Docker socket is deliberately NOT mounted here anymore.
      # The app reaches the Docker API through the restricted socket-proxy below
      # (see DOCKER_HOST) so an app RCE can't drive the raw Engine API directly.
    environment:
      BRAIN_PATH: /data/brain
      SECRET_KEY: ${SECRET_KEY}
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AI_MODEL: ${AI_MODEL:-claude-sonnet-4-6}
      NTFY_URL: http://ntfy:80
      NTFY_PUBLISH_TOKEN: ${NTFY_PUBLISH_TOKEN:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      # Talk to Docker through the filtered proxy, not the raw socket.
      DOCKER_HOST: tcp://socket-proxy:2375
      SCHEDULER_TIMEZONE: ${SCHEDULER_TIMEZONE:-America/Chicago}
      MORNING_DIGEST_HOUR: ${MORNING_DIGEST_HOUR:-6}
      OVERDUE_CHECK_HOUR: ${OVERDUE_CHECK_HOUR:-19}
      ALLOW_OPEN_REGISTRATION: ${ALLOW_OPEN_REGISTRATION:-false}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-false}
      # Managed hosting only — leave all three blank for self-hosted
      INFISICAL_URL: ${INFISICAL_URL:-}
      INFISICAL_TOKEN: ${INFISICAL_TOKEN:-}
      INFISICAL_ENV: ${INFISICAL_ENV:-prod}
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID:-}
    depends_on:
      - ntfy
      - socket-proxy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Restricted Docker API gateway. The app manages the n8n and cloudflared
  # containers (start/stop/restart, and recreate the tunnel with a new token),
  # so it needs container + image API access — but nothing else. This proxy
  # exposes ONLY those sections over an internal TCP port and mounts the socket
  # read-only, so an app compromise can't reach exec/volumes/networks/swarm/etc.
  # Residual: because the tunnel flow legitimately CREATES a container, POST is
  # enabled, so a determined attacker with app RCE could still craft a
  # host-mounting container. Closing that fully needs a fixed-command broker
  # (tracked as a follow-up). The port is NOT published to the host.
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: logcore-socket-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1      # list / inspect / create / remove the logcore containers
      IMAGES: 1          # pull cloudflared when (re)creating the tunnel
      POST: 1            # allow the mutating calls above (create/start/stop/restart)
      ALLOW_START: 1
      ALLOW_STOP: 1
      ALLOW_RESTARTS: 1
      # Everything else stays denied (default 0): EXEC, VOLUMES, NETWORKS, SWARM,
      # SERVICES, TASKS, NODES, SECRETS, CONFIGS, PLUGINS, SYSTEM, INFO, AUTH, BUILD.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # No `ports:` — only the app (same compose network) can reach it.

  tunnel:
    image: cloudflare/cloudflared:2026.7.2
    container_name: logcore-tunnel
    restart: unless-stopped
    network_mode: host
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app

  ntfy:
    image: binwiederhier/ntfy:v2.26.0
    container_name: logcore-ntfy
    restart: unless-stopped
    ports:
      # Bound to loopback by default. Reached internally by the app
      # (http://ntfy:80), via an SSH tunnel, or — since cloudflared runs with
      # network_mode: host below and therefore shares this same loopback — via a
      # Cloudflare Public Hostname mapped to http://localhost:5680, if you choose
      # to give ntfy a public address for remote push. The loopback bind alone
      # does NOT block that path.
      - "127.0.0.1:5680:80"
    volumes:
      - ntfy_data:/var/lib/ntfy
    environment:
      # Auth is off (read-write for everyone, incl. anonymous) until launch.sh's
      # provision_ntfy_auth provisions an admin publisher account and flips this
      # to read-only — anonymous subscribe (family members reading their channel)
      # still works, but publish then requires NTFY_PUBLISH_TOKEN above. This
      # matters most once ntfy has a public hostname (see the ports note); on a
      # LAN-only instance the default open mode is fine. Defaults to read-write
      # so a fresh install is never silently broken if provisioning hasn't run.
      NTFY_AUTH_DEFAULT_ACCESS: ${NTFY_AUTH_DEFAULT_ACCESS:-read-write}
      NTFY_AUTH_FILE: /var/lib/ntfy/auth.db
    command: serve

  n8n:
    image: docker.n8n.io/n8nio/n8n:2.31.3
    container_name: logcore-n8n
    restart: unless-stopped
    ports:
      # Bound to loopback — the app reaches n8n at http://n8n:5678 on the compose
      # network; browse the n8n UI via an SSH tunnel or the Cloudflare tunnel.
      - "127.0.0.1:5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    env_file:
      - n8n.env
    environment:
      N8N_API_ENABLED: "true"
      # launch.sh generates strong random values into docker/.env for NEW installs.
      # The literal fallbacks are kept ONLY for backward compatibility with existing
      # installs — do NOT rely on them, and NEVER change N8N_ENCRYPTION_KEY on an
      # instance that already has n8n data (it decrypts stored credentials; a new
      # key makes them permanently unreadable). Rotate N8N_API_KEY freely.
      N8N_API_KEY: ${N8N_API_KEY:-logcore-n8n-key}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-change-me-n8n}
      GENERIC_TIMEZONE: ${SCHEDULER_TIMEZONE:-America/Chicago}
      N8N_BASIC_AUTH_ACTIVE: "false"
    depends_on:
      - app

volumes:
  ntfy_data:
  n8n_data:
